services:
  nodjs-server:
    image: kirankhadka/kiran-node-server
    deploy:
      replicas: 5
    networks:
      - chaicode-internal 

  caddy:
    image: caddy:latest 
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - chaicode-internal   


networks:
  chaicode-internal:
    driver: bridge 
    
          

  