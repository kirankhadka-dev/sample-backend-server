name: Deploy Node.js Backend to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Verify Node.js environment
            echo "Node Version:"
            node -v

            echo "NPM Version:"
            npm -v

            echo "PM2 Version:"
            pm2 -v

            # Go to project
            cd /home/ubuntu/sample-backend-server

            # Pull latest changes
            git pull origin main

            # Install dependencies
            npm install

            # Restart application
            pm2 restart 0

            # Save PM2 process list
            pm2 save