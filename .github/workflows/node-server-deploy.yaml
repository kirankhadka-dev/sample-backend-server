name: Deploy Nodejs Code on AWS 

on: 
  push:
    branches:
      - main 
jobs:
  deploy:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Deploy on AWS 
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: 3.27.3.39
          username: ubuntu 
          key: ${{secrets.AWS_PEM_KEY}}
          script:  |
            cd /home/ubuntu/sample-backend-server
            git pull 
            npm install 
            pm2 restart 0





